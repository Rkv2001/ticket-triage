version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticket-triage-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_PATH=/app/data/tickets.db
      - CORS_ORIGIN=*
      - NODE_ENV=production
    volumes:
      - ticket_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticket-triage-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ticket_data:
    name: ticket_triage_db
